name: Weekly freshness bump

on:
  schedule:
    - cron: "23 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update last-updated date
        run: |
          NEW_DATE=$(date -u +"%Y-%m")
          sed -i -E "s/(Last update: )[0-9]{4}-[0-9]{2}/\1${NEW_DATE}/" README.md
          if git diff --quiet README.md; then
            echo "No date change needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Weekly freshness bump: ${NEW_DATE}"
          git push
